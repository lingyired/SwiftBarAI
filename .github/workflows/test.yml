name: menubar01 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (macOS)
    runs-on: macos-14

    timeout-minutes: 30

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      # Disable code signing for CI builds (saves time and avoids signing failures)
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            menubar01.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SwiftPM dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project menubar01.xcodeproj \
            -scheme menubar01

      - name: Run unit tests
        run: |
          set -o pipefail && \
          xcodebuild test \
            -project menubar01.xcodeproj \
            -scheme menubar01 \
            -destination 'platform=macOS' \
            -configuration Debug \
            -only-testing:menubar01Tests

      - name: Upload test result bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
